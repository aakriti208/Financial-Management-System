# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Database (PostgreSQL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/fms_db
spring.datasource.username=aakritidhakal
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT
# ============================================================
jwt.secret=fms-dev-secret-key-change-this-in-production-min32chars
jwt.expiration-ms=86400000

# ============================================================
# Groq (groq.com) — free tier, fast inference
# ============================================================
grok.api.key=${GROQ_API_KEY:your-groq-api-key-here}
grok.model.chat=llama-3.3-70b-versatile

# ============================================================
# SQL Init (runs schema.sql AFTER Hibernate DDL to create pgvector tables)
# ============================================================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ============================================================
# Error responses
# ============================================================
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================================
# Logging
# ============================================================
logging.level.com.fms=DEBUG
logging.level.org.springframework.security=DEBUG
